spring.application.name=despacho-consumidor-service
server.port=${PORT:8081}

# =========================================================================
# BASE DE DATOS: H2 EN MODO SERVIDOR (TCP), COMPARTIDA CON EL PRODUCTOR
# =========================================================================
spring.datasource.url=jdbc:h2:tcp://${H2_SERVER_HOST:localhost}:${H2_SERVER_PORT:1521}/./despachodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# =========================================================================
# AWS S3
# =========================================================================
aws.accessKeyId=${AWS_ACCESS_KEY_ID:dummy-access-key}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:dummy-secret-key}
aws.sessionToken=${AWS_SESSION_TOKEN:}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}

# =========================================================================
# EFS TEMPORAL (generación de PDF antes de subir a S3)
# =========================================================================
storage.efs.path=${EFS_TEMP_PATH:target/efs/guias}

# =========================================================================
# RABBITMQ — CLÚSTER DE 2 NODOS
# =========================================================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Gatillo de prueba para forzar un error y demostrar la DLQ en el video
app.rabbitmq.test-fail-prefix=ERROR-